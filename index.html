<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1925 US Code Viewer</title>
    <style>
        :root {
            --paper: #f6f1e8;
            --ink: #2f2720;
            --panel: rgba(255, 252, 247, 0.9);
            --line: rgba(109, 74, 38, 0.18);
            --bronze: #8b4513;
            --bronze-deep: #6d3f18;
            --navy: #1f3a5f;
            --muted: #6b625a;
            --shadow: 0 18px 40px rgba(45, 31, 17, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(139, 69, 19, 0.12), transparent 30%),
                radial-gradient(circle at top right, rgba(31, 58, 95, 0.1), transparent 28%),
                linear-gradient(180deg, #f7f2ea 0%, #efe6d7 100%);
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--panel);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 3px solid rgba(139, 69, 19, 0.2);
        }

        .header h1 {
            color: var(--bronze);
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.08);
        }

        .header .subtitle {
            font-size: 1.2em;
            color: var(--muted);
            font-style: italic;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
            gap: 18px;
            margin-bottom: 28px;
            align-items: stretch;
        }

        .toolbar-card {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 12px 28px rgba(69, 47, 27, 0.08);
        }

        .toolbar-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .source-switch {
            display: inline-flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .source-button {
            border: 1px solid transparent;
            border-radius: 999px;
            padding: 10px 16px;
            font: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .source-button:hover {
            transform: translateY(-1px);
        }

        .source-button[data-source="historical"] {
            background: linear-gradient(135deg, var(--bronze), #b46d36);
        }

        .source-button[data-source="current"] {
            background: linear-gradient(135deg, var(--navy), #315582);
        }

        .source-button.active {
            border-color: rgba(255, 255, 255, 0.85);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3), 0 12px 24px rgba(0, 0, 0, 0.16);
        }

        .source-button:not(.active) {
            opacity: 0.7;
        }

        .source-meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.95rem;
            min-height: 1.4em;
        }

        .chapter {
            margin-bottom: 40px;
            border: 1px solid #ddd;
            border-radius: 14px;
            overflow: hidden;
            display: none; /* Hidden by default when there's a chapter table */
            box-shadow: 0 10px 24px rgba(58, 42, 30, 0.06);
        }

        .chapter.visible {
            display: block; /* Show when explicitly made visible */
        }

        .chapter.no-table {
            display: block; /* Always show when there's no chapter table */
        }

        .chapter-header {
            background: linear-gradient(135deg, #8B4513, #A0522D);
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s ease;
            position: relative;
        }

        .chapter-header:hover {
            background: linear-gradient(135deg, #A0522D, #8B4513);
        }

        .chapter-header h2 {
            font-size: 1.3em;
            margin: 0;
        }

        .chapter-header::after {
            content: '▼';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            transition: transform 0.3s ease;
        }

        .chapter-header.collapsed::after {
            transform: translateY(-50%) rotate(-90deg);
        }

        .chapter-content {
            background: white;
            max-height: none;
            overflow: visible;
            transition: max-height 0.3s ease;
        }

        .chapter-content.collapsed {
            max-height: 0;
            overflow: hidden;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s ease;
        }

        .section:last-child {
            border-bottom: none;
        }

        .section:hover {
            background-color: #fafafa;
        }

        .section-number {
            display: inline-block;
            background: #8B4513;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .section-title {
            font-weight: bold;
            color: #8B4513;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .section-content {
            text-align: justify;
            line-height: 1.7;
            color: #444;
        }

        .citation {
            font-style: italic;
            color: #666;
            font-size: 0.9em;
            margin-top: 8px;
        }

        .title-selector {
            margin-bottom: 0;
        }

        .title-select {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid rgba(139, 69, 19, 0.35);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.95);
            color: #8B4513;
            cursor: pointer;
            min-width: 200px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
        }

        .title-select:focus {
            outline: none;
            border-color: #A0522D;
        }

        .chapter-table {
            background: white;
            border: 2px solid rgba(139, 69, 19, 0.6);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            box-shadow: 0 10px 24px rgba(58, 42, 30, 0.08);
        }

        .chapter-table h3 {
            color: #8B4513;
            font-size: 1.2em;
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 2px solid #8B4513;
            padding-bottom: 8px;
        }

        .chapter-table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 8px;
        }

        .chapter-table-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 10px;
            background: linear-gradient(180deg, #fcfaf7 0%, #f4ede2 100%);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 4px solid #8B4513;
        }

        .chapter-table-item:hover {
            background: #f0e6d9;
            transform: translateX(5px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chapter-table-number {
            font-weight: bold;
            color: #8B4513;
            min-width: 28px;
            font-size: 0.95em;
        }

        .chapter-table-name {
            color: #444;
            line-height: 1.3;
            font-size: 0.9em;
        }

        .empty-state {
            background: rgba(255, 255, 255, 0.84);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 28px;
            text-align: center;
            box-shadow: 0 12px 28px rgba(69, 47, 27, 0.08);
        }

        .empty-state h3 {
            color: var(--bronze-deep);
            margin-bottom: 10px;
            font-size: 1.35rem;
        }

        .empty-state p {
            color: var(--muted);
            max-width: 620px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .chapter-table-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>United States Code Viewer</h1>
            <div class="subtitle" id="titleSubtitle">Switch between the 1926 compilation and the current U.S. Code text.</div>
        </div>

        <div class="toolbar">
            <div class="toolbar-card">
                <div class="toolbar-label">Edition</div>
                <div class="source-switch" id="sourceSwitch">
                    <button class="source-button active" data-source="historical" type="button">1926 Edition</button>
                    <button class="source-button" data-source="current" type="button">Current U.S. Code</button>
                </div>
                <div class="source-meta" id="sourceMeta">Loading available titles...</div>
            </div>

            <div class="toolbar-card title-selector">
                <div class="toolbar-label">Title</div>
                <select class="title-select" id="titleSelect">
                    <option value="">Loading titles...</option>
                </select>
            </div>
        </div>

        <div id="content">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script>
        let currentXmlData = null;
        let availableTitles = [];
        let currentSource = 'historical';

        const SOURCE_CONFIG = {
            historical: {
                label: '1926 Edition',
                emptyMessage: 'This title is not available in the 1926 XML files.'
            },
            current: {
                label: 'Current U.S. Code',
                emptyMessage: 'This title is not available in the current U.S. Code XML files.'
            }
        };

        const CURRENT_SUFFIXES = ['', 'A'];
        const GROUP_TAGS = ['subtitle', 'part', 'subpart', 'chapter', 'subchapter'];
        const SKIP_SECTION_ANCESTORS = ['section', 'note', 'notes', 'toc', 'layout', 'appendix'];

        function normalizeDisplayText(text) {
            return (text || '')
                .replace(/\u00a0|\u2002|\u2003|\u2009|\u202f/g, ' ')
                .replace(/â€”/g, '—')
                .replace(/â€“/g, '–')
                .replace(/â€¯/g, ' ')
                .replace(/â€€/g, ' ')
                .replace(/Â§/g, '§')
                .replace(/Â/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function normalizeTitleId(number, suffix = '') {
            return `${parseInt(number, 10)}${suffix.toUpperCase()}`;
        }

        function splitTitleId(titleId) {
            const match = String(titleId).match(/^(\d+)([A-Z]?)$/i);
            if (!match) {
                return { number: 0, suffix: '' };
            }

            return {
                number: parseInt(match[1], 10),
                suffix: match[2].toUpperCase()
            };
        }

        function buildHistoricalFilename(titleId) {
            const { number, suffix } = splitTitleId(titleId);
            if (!number || suffix) {
                return null;
            }

            return `Title_${number}.xml`;
        }

        function buildCurrentFilename(titleId) {
            const { number, suffix } = splitTitleId(titleId);
            if (!number) {
                return null;
            }

            return `Current US Code/usc${String(number).padStart(2, '0')}${suffix}.xml`;
        }

        function compareTitleEntries(left, right) {
            const leftParts = splitTitleId(left.id);
            const rightParts = splitTitleId(right.id);

            if (leftParts.number !== rightParts.number) {
                return leftParts.number - rightParts.number;
            }

            return leftParts.suffix.localeCompare(rightParts.suffix);
        }

        function getFallbackTitleLabel(titleId) {
            const { number, suffix } = splitTitleId(titleId);
            return suffix ? `Title ${number}${suffix}` : `Title ${number}`;
        }

        function getEntryLabel(entry) {
            return entry?.label || getFallbackTitleLabel(entry?.id || '');
        }

        function getAvailabilityLabel(entry) {
            if (entry.historical && entry.current) {
                return 'Both editions';
            }

            return entry.historical ? '1926 only' : 'Current only';
        }

        function getTitleEntry(titleId) {
            return availableTitles.find(entry => entry.id === titleId) || null;
        }

        function getSelectedEntry() {
            const selectedId = document.getElementById('titleSelect').value;
            return selectedId ? getTitleEntry(selectedId) : null;
        }

        function getActiveSourceFile(entry) {
            return entry ? entry[currentSource] || null : null;
        }

        function getElementsByLocalName(root, name) {
            return Array.from(root.getElementsByTagNameNS('*', name));
        }

        function getDirectChildrenByLocalName(element, name) {
            return Array.from(element.children).filter(child => child.localName === name);
        }

        function getDirectChildByLocalName(element, name) {
            return getDirectChildrenByLocalName(element, name)[0] || null;
        }

        function getDirectChildText(element, name) {
            const child = getDirectChildByLocalName(element, name);
            return child ? normalizeDisplayText(child.textContent) : '';
        }

        function hasAncestorWithLocalName(element, names, stopAt = null) {
            let parent = element.parentElement;

            while (parent && parent !== stopAt) {
                if (names.includes(parent.localName)) {
                    return true;
                }
                parent = parent.parentElement;
            }

            return false;
        }

        function findClosestGroupingAncestor(element, stopAt) {
            let parent = element.parentElement;

            while (parent && parent !== stopAt) {
                if (GROUP_TAGS.includes(parent.localName)) {
                    return parent;
                }
                parent = parent.parentElement;
            }

            return null;
        }

        function buildGroupName(groupElement) {
            if (!groupElement) {
                return 'Sections';
            }

            const num = getDirectChildText(groupElement, 'num');
            const heading = getDirectChildText(groupElement, 'heading');
            const groupName = normalizeDisplayText([num, heading].filter(Boolean).join(' '));
            return groupName || groupElement.localName.replace(/^./, character => character.toUpperCase());
        }

        function extractHistoricalSection(sectionEl) {
            const sectionName = sectionEl.getAttribute('name') || '';
            const sectionContent = normalizeDisplayText(sectionEl.textContent);
            const match = sectionName.match(/^([^.]*)\.\s*(.+)$/);
            let number = '';
            let title = sectionName;

            if (match) {
                number = normalizeDisplayText(match[1]);
                title = normalizeDisplayText(match[2]);
            }

            const citationMatch = sectionContent.match(/\(([^)]+)\)\.?\s*$/);
            let content = sectionContent;
            let citation = '';

            if (citationMatch) {
                citation = '(' + citationMatch[1] + ')';
                content = normalizeDisplayText(sectionContent.replace(/\s*\([^)]+\)\.?\s*$/, ''));
            }

            return { number, title, content, citation };
        }

        function extractUSLMSection(sectionEl) {
            const number = getDirectChildText(sectionEl, 'num').replace(/^\[|\]$/g, '');
            const title = getDirectChildText(sectionEl, 'heading') || 'Untitled section';
            let content = normalizeDisplayText(sectionEl.textContent);

            if (number && content.startsWith(number)) {
                content = normalizeDisplayText(content.slice(number.length));
            }

            if (title && content.startsWith(title)) {
                content = normalizeDisplayText(content.slice(title.length));
            }

            return {
                number: number || '§',
                title,
                content: content || 'No section text extracted from this file.',
                citation: ''
            };
        }

        // Check if a file exists by trying to load it
        async function checkFileExists(filename) {
            try {
                const response = await fetch(filename);
                return response.ok;
            } catch (err) {
                // If fetch fails, try XMLHttpRequest with GET
                try {
                    return await new Promise((resolve) => {
                        const xhr = new XMLHttpRequest();
                        xhr.open('GET', filename, true);
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === 4) {
                                resolve(xhr.status === 200 || xhr.status === 0);
                            }
                        };
                        xhr.onerror = () => resolve(false);
                        xhr.onabort = () => resolve(false);
                        xhr.send();
                    });
                } catch {
                    return false;
                }
            }
        }

        // Get title name from XML file
        async function getTitleName(filename) {
            try {
                const xmlText = await loadLocalFile(filename);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const parsed = parseXMLToObject(xmlDoc);
                if (parsed && parsed.title) {
                    return parsed.title;
                }
            } catch (error) {
                console.log(`Could not get title name from ${filename}`);
            }
            return filename.replace('.xml', '');
        }

        function upsertTitleEntry(titleMap, titleId, sourceKey, filename, titleName) {
            const entry = titleMap.get(titleId) || {
                id: titleId,
                label: '',
                historical: null,
                current: null
            };

            entry[sourceKey] = { filename, titleName };

            if (!entry.label || sourceKey === 'historical') {
                entry.label = titleName;
            }

            titleMap.set(titleId, entry);
        }

        function populateTitleSelect() {
            const titleSelect = document.getElementById('titleSelect');
            const previousValue = titleSelect.value;
            titleSelect.innerHTML = '<option value="">Select a Title</option>';

            availableTitles.forEach(entry => {
                const option = document.createElement('option');
                option.value = entry.id;
                option.textContent = `${getEntryLabel(entry)} • ${getAvailabilityLabel(entry)}`;
                titleSelect.appendChild(option);
            });

            if (previousValue && availableTitles.some(entry => entry.id === previousValue)) {
                titleSelect.value = previousValue;
            }
        }

        // Detect available title files across both XML sets
        async function detectAvailableTitles() {
            const titleSelect = document.getElementById('titleSelect');
            titleSelect.innerHTML = '<option value="">Detecting titles...</option>';

            const titleMap = new Map();
            let consecutiveHistoricalMisses = 0;
            let consecutiveCurrentMisses = 0;
            const maxConsecutiveMisses = 3;

            for (let i = 1; i <= 50; i++) {
                const historicalFilename = buildHistoricalFilename(i);
                const historicalExists = historicalFilename ? await checkFileExists(historicalFilename) : false;

                if (historicalExists) {
                    consecutiveHistoricalMisses = 0;
                    upsertTitleEntry(titleMap, normalizeTitleId(i), 'historical', historicalFilename, await getTitleName(historicalFilename));
                } else {
                    consecutiveHistoricalMisses++;
                }

                let foundCurrentThisRound = false;
                for (const suffix of CURRENT_SUFFIXES) {
                    const currentId = normalizeTitleId(i, suffix);
                    const currentFilename = buildCurrentFilename(currentId);
                    const currentExists = currentFilename ? await checkFileExists(currentFilename) : false;

                    if (currentExists) {
                        foundCurrentThisRound = true;
                        upsertTitleEntry(titleMap, currentId, 'current', currentFilename, await getTitleName(currentFilename));
                    }
                }

                consecutiveCurrentMisses = foundCurrentThisRound ? 0 : consecutiveCurrentMisses + 1;

                if (i > 15 && consecutiveHistoricalMisses >= maxConsecutiveMisses && consecutiveCurrentMisses >= maxConsecutiveMisses) {
                    break;
                }
            }

            availableTitles = Array.from(titleMap.values()).sort(compareTitleEntries);
            populateTitleSelect();

            if (availableTitles.length === 0) {
                titleSelect.innerHTML = '<option value="">No titles found</option>';
            }

            return availableTitles;
        }

        // Load and parse XML file
        async function loadXMLFile(filename) {
            try {
                // Try XMLHttpRequest first (better for local files)
                const xmlText = await loadLocalFile(filename);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                // Check for parsing errors
                const parseError = xmlDoc.querySelector("parsererror");
                if (parseError) {
                    throw new Error("Error parsing XML");
                }
                
                return parseXMLToObject(xmlDoc);
            } catch (error) {
                console.error('Error loading XML file:', error);
                
                // Show user-friendly instructions
                const errorMsg = `
Error loading ${filename}. 

This can happen when opening HTML files directly from your computer due to browser security restrictions.

Solutions:
1. RECOMMENDED: Start a simple web server:
   - If you have Python installed, open Command Prompt in this folder and run:
     python -m http.server 8000
   - Then open: http://localhost:8000/Title_1_Viewer.html

2. Try a different browser (some handle local files better)

3. Use the embedded data version (click OK to switch to embedded data)
                `;
                
                if (confirm(errorMsg + "\n\nWould you like to use the embedded data version instead?")) {
                    return getEmbeddedData(filename);
                }
                
                return null;
            }
        }

        // XMLHttpRequest approach for local files
        function loadLocalFile(filename) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', filename, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200 || xhr.status === 0) { // 0 for local files
                            resolve(xhr.responseText);
                        } else {
                            reject(new Error(`HTTP ${xhr.status}: ${xhr.statusText}`));
                        }
                    }
                };
                xhr.onerror = function() {
                    reject(new Error('Network error or file not found'));
                };
                xhr.send();
            });
        }

        // Fallback embedded data
        function getEmbeddedData(filename) {
            if (filename === 'Title_1.xml') {
                return {
                    title: "TITLE 1.—GENERAL PROVISIONS",
                    chapters: [
                        {
                            name: "Chapter 1.—RULES OF CONSTRUCTION.",
                            sections: [
                                {
                                    number: "1",
                                    title: "Words importing singular number, masculine gender, etc.; extended application.",
                                    content: "In determining the meaning of any Act or resolution of Congress, words importing the singular number may extend and be applied to several persons or things; words importing the plural number may include the singular; words importing the masculine gender may be applied to females; the words \"insane person\" and \"lunatic\" shall include every idiot, non compos, lunatic, and insane person; the word \"person\" may extend and be applied to partnerships and corporations, and the reference to any officer shall include any person authorized by law to perform the duties of such office, unless the context shows that such words were intended to be used in a more limited sense; and a requirement of an \"oath\" shall be deemed complied with by making affirmation in judicial form.",
                                    citation: "(R.S. § 1.)"
                                },
                                {
                                    number: "2",
                                    title: "\"County\" as including \"parish,\" etc.",
                                    content: "The word \"county\" includes a parish, or any other equivalent subdivision of a State or Territory of the United States.",
                                    citation: "(R.S. § 2.)"
                                },
                                {
                                    number: "3",
                                    title: "\"Vessel\" as including all means of water transportation.",
                                    content: "The word \"vessel\" includes every description of water craft or other artificial contrivance used, or capable of being used, as a means of transportation on water.",
                                    citation: "(R.S. § 3.)"
                                },
                                {
                                    number: "4",
                                    title: "\"Vehicle\" as including all means of land transportation.",
                                    content: "The word \"vehicle\" includes every description of carriage or other artificial contrivance used, or capable of being used, as a means of transportation on land.",
                                    citation: "(R.S. § 4.)"
                                },
                                {
                                    number: "5",
                                    title: "\"Company\" and \"association\" as including successors and assigns.",
                                    content: "The word \"company\" or \"association,\" when used in reference to a corporation, shall be deemed to embrace the words \"successors and assigns of such company or association,\" in like manner as if these last-named words, or words of similar import, were expressed.",
                                    citation: "(R.S. § 5.)"
                                }
                            ]
                        },
                        {
                            name: "Chapter 2.—ACTS AND RESOLUTIONS OF THE CONGRESS; FORMALITIES OF ENACTMENT; REPEALS; SEALING OF INSTRUMENTS.",
                            sections: [
                                {
                                    number: "21",
                                    title: "Enacting clause.",
                                    content: "The enacting clause of all Acts of Congress shall be in the following form: \"Be it enacted by the Senate and House of Representatives of the United States of America in Congress assembled.\"",
                                    citation: "(R.S. § 7.)"
                                },
                                {
                                    number: "22",

        function parseHistoricalXMLToObject(xmlDoc) {
            const titleElement = xmlDoc.querySelector('Title');
            if (!titleElement) return null;

            const titleName = normalizeDisplayText(titleElement.getAttribute('name'));
            const chapters = [];
            const chapterElements = titleElement.querySelectorAll(':scope > Chapter');
            
            if (chapterElements.length > 0) {
                chapterElements.forEach(chapterEl => {
                    const sections = Array.from(chapterEl.querySelectorAll(':scope > Section, :scope > section'))
                        .map(extractHistoricalSection);

                    if (sections.length > 0) {
                        chapters.push({
                            name: normalizeDisplayText(chapterEl.getAttribute('name')),
                            sections
                        });
                    }
                });
            } else {
                const sections = Array.from(titleElement.querySelectorAll(':scope > Section, :scope > section'))
                    .map(extractHistoricalSection);

                if (sections.length > 0) {
                    chapters.push({
                        name: 'Sections',
                        sections
                    });
                }
            }

            return {
                title: titleName,
                chapters,
                sourceLabel: SOURCE_CONFIG.historical.label
            };
        }

        function parseCurrentUSLMToObject(xmlDoc) {
            const main = getElementsByLocalName(xmlDoc, 'main')[0];
            const titleElement = main ? getDirectChildByLocalName(main, 'title') : null;
            if (!titleElement) return null;

            const titleNum = getDirectChildText(titleElement, 'num').replace(/[—–-]\s*$/, '');
            const titleHeading = getDirectChildText(titleElement, 'heading');
            const chapterMap = new Map();

            getElementsByLocalName(titleElement, 'section')
                .filter(sectionEl => !hasAncestorWithLocalName(sectionEl, SKIP_SECTION_ANCESTORS, titleElement))
                .forEach(sectionEl => {
                    const groupElement = findClosestGroupingAncestor(sectionEl, titleElement);
                    const key = groupElement
                        ? (groupElement.getAttribute('identifier') || groupElement.getAttribute('id') || buildGroupName(groupElement))
                        : 'sections';

                    if (!chapterMap.has(key)) {
                        chapterMap.set(key, {
                            name: buildGroupName(groupElement),
                            sections: []
                        });
                    }

                    chapterMap.get(key).sections.push(extractUSLMSection(sectionEl));
                });

            return {
                title: normalizeDisplayText([titleNum, titleHeading].filter(Boolean).join(' ')) || 'Current U.S. Code',
                chapters: Array.from(chapterMap.values()),
                sourceLabel: SOURCE_CONFIG.current.label
            };
        }

        // Parse XML document to JavaScript object
        function parseXMLToObject(xmlDoc) {
            if (xmlDoc.querySelector('Title')) {
                return parseHistoricalXMLToObject(xmlDoc);
            }

            if (xmlDoc.documentElement && xmlDoc.documentElement.localName === 'uscDoc') {
                return parseCurrentUSLMToObject(xmlDoc);
            }

            return null;
        }

        // Render content to HTML
        function renderContent() {
            if (!currentXmlData) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h3>Select a title</h3>
                        <p>Pick a title, then flip between editions to compare your 1926 XML against the current U.S. Code files.</p>
                    </div>
                `;
                return;
            }

            if (currentXmlData.unavailable) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h3>${currentXmlData.title}</h3>
                        <p>${currentXmlData.message}</p>
                    </div>
                `;
                return;
            }

            const container = document.getElementById('content');
            container.innerHTML = '';

            const hasMultipleChapters = currentXmlData.chapters.length > 1;

            // Add chapter table if there are multiple chapters
            if (hasMultipleChapters) {
                const chapterTable = document.createElement('div');
                chapterTable.className = 'chapter-table';
                
                const tableTitle = document.createElement('h3');
                tableTitle.textContent = 'Table of Contents';
                chapterTable.appendChild(tableTitle);
                
                const tableGrid = document.createElement('div');
                tableGrid.className = 'chapter-table-grid';
                
                currentXmlData.chapters.forEach((chapter, chapterIndex) => {
                    // Extract chapter number from chapter name (e.g., "Chapter 1.—GRAIN FUTURES ACT.")
                    const chapterMatch = chapter.name.match(/Chapter\s+(\d+)\.\s*[—–-]\s*(.+)/i);
                    let chapterNum = chapterIndex + 1;
                    let chapterName = chapter.name;
                    
                    if (chapterMatch) {
                        chapterNum = chapterMatch[1];
                        chapterName = chapterMatch[2].replace(/\.\s*$/, ''); // Remove trailing period
                    }
                    
                    const tableItem = document.createElement('div');
                    tableItem.className = 'chapter-table-item';
                    tableItem.onclick = () => showOnlyChapter(chapterIndex);
                    
                    const itemNumber = document.createElement('div');
                    itemNumber.className = 'chapter-table-number';
                    itemNumber.textContent = chapterNum + '.';
                    
                    const itemName = document.createElement('div');
                    itemName.className = 'chapter-table-name';
                    itemName.textContent = chapterName;
                    
                    tableItem.appendChild(itemNumber);
                    tableItem.appendChild(itemName);
                    tableGrid.appendChild(tableItem);
                });
                
                chapterTable.appendChild(tableGrid);
                container.appendChild(chapterTable);
            }

            currentXmlData.chapters.forEach((chapter, chapterIndex) => {
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter';
                chapterDiv.id = 'chapter-' + chapterIndex;
                
                // If there's no chapter table, show sections directly (no collapsing)
                if (!hasMultipleChapters) {
                    chapterDiv.classList.add('no-table');
                }
                
                const chapterHeader = document.createElement('div');
                chapterHeader.className = hasMultipleChapters ? 'chapter-header collapsed' : 'chapter-header';
                chapterHeader.onclick = () => toggleChapter(chapterIndex);
                
                const chapterTitle = document.createElement('h2');
                chapterTitle.textContent = chapter.name;
                chapterHeader.appendChild(chapterTitle);
                
                const chapterContent = document.createElement('div');
                chapterContent.className = hasMultipleChapters ? 'chapter-content collapsed' : 'chapter-content';
                
                chapter.sections.forEach(section => {
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section';
                    
                    const sectionNumber = document.createElement('div');
                    sectionNumber.className = 'section-number';
                    sectionNumber.textContent = section.number;
                    
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'section-title';
                    sectionTitle.textContent = section.title;
                    
                    const sectionContentDiv = document.createElement('div');
                    sectionContentDiv.className = 'section-content';
                    sectionContentDiv.textContent = section.content;
                    
                    sectionDiv.appendChild(sectionNumber);
                    sectionDiv.appendChild(sectionTitle);
                    sectionDiv.appendChild(sectionContentDiv);
                    
                    if (section.citation) {
                        const citation = document.createElement('div');
                        citation.className = 'citation';
                        citation.textContent = section.citation;
                        sectionDiv.appendChild(citation);
                    }
                    
                    chapterContent.appendChild(sectionDiv);
                });
                
                chapterDiv.appendChild(chapterHeader);
                chapterDiv.appendChild(chapterContent);
                container.appendChild(chapterDiv);
            });
        }

        function updateSourceButtons() {
            document.querySelectorAll('.source-button').forEach(button => {
                button.classList.toggle('active', button.dataset.source === currentSource);
            });
        }

        function updateSourceMeta() {
            const sourceMeta = document.getElementById('sourceMeta');
            const selectedEntry = getSelectedEntry();

            if (!availableTitles.length) {
                sourceMeta.textContent = 'No titles detected yet.';
                return;
            }

            if (!selectedEntry) {
                sourceMeta.textContent = `${availableTitles.length} titles detected. Current view: ${SOURCE_CONFIG[currentSource].label}.`;
                return;
            }

            const alternateSource = currentSource === 'historical' ? 'current' : 'historical';
            const currentAvailable = !!selectedEntry[currentSource];
            const alternateAvailable = !!selectedEntry[alternateSource];

            if (currentAvailable && alternateAvailable) {
                sourceMeta.textContent = `${getEntryLabel(selectedEntry)} is available in both editions.`;
            } else if (currentAvailable) {
                sourceMeta.textContent = `${getEntryLabel(selectedEntry)} is only available in ${SOURCE_CONFIG[currentSource].label}.`;
            } else if (alternateAvailable) {
                sourceMeta.textContent = `${getEntryLabel(selectedEntry)} is unavailable in ${SOURCE_CONFIG[currentSource].label}, but available in ${SOURCE_CONFIG[alternateSource].label}.`;
            } else {
                sourceMeta.textContent = `${getEntryLabel(selectedEntry)} is unavailable in both detected editions.`;
            }
        }

        function renderUnavailableTitle(entry) {
            currentXmlData = {
                unavailable: true,
                title: getEntryLabel(entry),
                message: SOURCE_CONFIG[currentSource].emptyMessage
            };
            document.getElementById('titleSubtitle').textContent = `${getEntryLabel(entry)} · ${SOURCE_CONFIG[currentSource].label}`;
            updateSourceMeta();
            renderContent();
        }

        function setSource(source) {
            currentSource = source;
            updateSourceButtons();
            updateSourceMeta();

            if (document.getElementById('titleSelect').value) {
                handleTitleChange();
            } else {
                document.getElementById('titleSubtitle').textContent = 'Switch between the 1926 compilation and the current U.S. Code text.';
                renderContent();
            }
        }

        // Toggle chapter visibility
        function toggleChapter(index) {
            const chapters = document.querySelectorAll('.chapter');
            const chapter = chapters[index];
            const header = chapter.querySelector('.chapter-header');
            const content = chapter.querySelector('.chapter-content');
            
            header.classList.toggle('collapsed');
            content.classList.toggle('collapsed');
        }

        // Show only the selected chapter and hide all others
        function showOnlyChapter(index) {
            const allChapters = document.querySelectorAll('.chapter');
            const selectedChapter = document.getElementById('chapter-' + index);
            
            if (selectedChapter) {
                // Hide all chapters first
                allChapters.forEach(chapter => {
                    chapter.classList.remove('visible');
                });
                
                // Show only the selected chapter
                selectedChapter.classList.add('visible');
                
                // Scroll to the chapter
                selectedChapter.scrollIntoView({ behavior: 'smooth', block: 'start' });
                
                // Open the chapter content
                const header = selectedChapter.querySelector('.chapter-header');
                const content = selectedChapter.querySelector('.chapter-content');
                
                header.classList.remove('collapsed');
                content.classList.remove('collapsed');
            }
        }

        // Handle title selection
        function handleTitleChange() {
            const titleSelect = document.getElementById('titleSelect');
            const titleSubtitle = document.getElementById('titleSubtitle');
            const selectedEntry = getTitleEntry(titleSelect.value);
            const selectedFile = getActiveSourceFile(selectedEntry);
            
            if (titleSelect.value) {
                if (!selectedFile) {
                    renderUnavailableTitle(selectedEntry);
                    return;
                }

                titleSubtitle.textContent = 'Loading...';
                updateSourceMeta();
                loadXMLFile(selectedFile.filename).then(data => {
                    if (data) {
                        currentXmlData = data;
                        titleSubtitle.textContent = `${data.title} · ${SOURCE_CONFIG[currentSource].label}`;
                        updateSourceMeta();
                        renderContent();
                    } else {
                        titleSubtitle.textContent = 'Error loading title';
                        currentXmlData = null;
                        renderContent();
                    }
                });
            } else {
                titleSubtitle.textContent = 'Switch between the 1926 compilation and the current U.S. Code text.';
                currentXmlData = null;
                updateSourceMeta();
                renderContent();
            }
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', async function() {
            const titleSelect = document.getElementById('titleSelect');
            const sourceSwitch = document.getElementById('sourceSwitch');

            titleSelect.addEventListener('change', handleTitleChange);
            sourceSwitch.addEventListener('click', event => {
                const sourceButton = event.target.closest('.source-button');
                if (!sourceButton) {
                    return;
                }

                setSource(sourceButton.dataset.source);
            });

            renderContent();
            
            // Detect and populate available titles
            await detectAvailableTitles();
            updateSourceButtons();
            updateSourceMeta();
        });
    </script>
